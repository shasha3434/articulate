<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Articulate! Digital Edition</title>
  <meta name="description" content="Articulate board game - digital edition">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0B0B1A">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎲</text></svg>">
  <style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0B0B1A;overflow-x:hidden}#root{min-height:100vh}</style>

<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
  <script src="words.js"></script>
  <script type="text/babel" data-type="module">
const{useState,useEffect,useRef}=React;
const CYCLE=["Spades","World","Person","Random","Nature","Object","Action"];const _FULL=[];for(let i=0;i<6;i++)_FULL.push(...CYCLE);const _oi=_FULL.indexOf("Object");const BOARD=[..._FULL.slice(_oi),..._FULL.slice(0,_oi)];const TOTAL=42,FINISH=41;const CATEGORIES=["Person","World","Object","Action","Nature","Random"];
const CC={World:{bg:"#1E3A8A",ring:"#1E40AF"},Person:{bg:"#EAB308",ring:"#CA8A04"},Random:{bg:"#DC2626",ring:"#B91C1C"},Nature:{bg:"#16A34A",ring:"#15803D"},Object:{bg:"#38BDF8",ring:"#0EA5E9"},Action:{bg:"#F97316",ring:"#EA580C"},Spades:{bg:"#1E293B",ring:"#0F172A"}};
const CT={World:"#fff",Person:"#1a1a1a",Random:"#fff",Nature:"#fff",Object:"#1a1a1a",Action:"#fff",Spades:"#E2E8F0"};
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function rCat(){return CATEGORIES[Math.floor(Math.random()*CATEGORIES.length)];}
function rWord(cat,used){const c=cat==="Spades"?rCat():cat;const p=WORD_BANK[c].filter(w=>!used.has(w));if(!p.length)return{word:WORD_BANK[c][Math.floor(Math.random()*WORD_BANK[c].length)],cat:c};return{word:p[Math.floor(Math.random()*p.length)],cat:c};}
function catForPos(pos){return BOARD[Math.min(pos,FINISH)];}
const TLEN=32;
function App(){const[playerNames,setPlayerNames]=useState(["","","",""]);const[teamCount,setTeamCount]=useState(2);const[screen,setScreen]=useState("SETUP");const[confirmQuit,setConfirmQuit]=useState(false);const[teams,setTeams]=useState([]);const[positions,setPositions]=useState([]);const[curTI,setCurTI]=useState(0);const[roundStart,setRoundStart]=useState(0);const[usedWords,setUsedWords]=useState(new Set());const[timer,setTimer]=useState(TLEN);const[timerOn,setTimerOn]=useState(false);const[curWord,setCurWord]=useState("");const[curWordCat,setCurWordCat]=useState("");const[curCat,setCurCat]=useState("");const[turnWords,setTurnWords]=useState([]);const[hasSkip,setHasSkip]=useState(true);const[skipIdx,setSkipIdx]=useState(-1);const[viewingSkip,setViewingSkip]=useState(false);const[wordRevealed,setWordRevealed]=useState(false);const[spWords,setSpWords]=useState([]);const[spChosen,setSpChosen]=useState(null);const[landedSpade,setLandedSpade]=useState(false);const[justReachedFinish,setJustReachedFinish]=useState(false);const[roundFinishWinners,setRoundFinishWinners]=useState([]);const[teamsAtFinish,setTeamsAtFinish]=useState(new Set());const[finishSpadeFor,setFinishSpadeFor]=useState(-1);const[battleTeams,setBattleTeams]=useState([]);const[battleRound,setBattleRound]=useState(0);const[battleWinners,setBattleWinners]=useState([]);const timerRef=useRef(null);
useEffect(()=>{if(timerOn&&timer>0){timerRef.current=setTimeout(()=>setTimer(t=>t-1),1000);return()=>clearTimeout(timerRef.current);}if(timerOn&&timer<=0){setTimerOn(false);playBuzz();endTurn();}},[timerOn,timer]);
function playBuzz(){try{const c=new(window.AudioContext||window.webkitAudioContext)();const o=c.createOscillator();const g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=280;o.type="square";g.gain.value=0.12;o.start();o.stop(c.currentTime+0.6);}catch(e){}}
function resetGame(){setScreen("SETUP");setTeams([]);setPositions([]);setUsedWords(new Set());setTeamsAtFinish(new Set());setRoundFinishWinners([]);setConfirmQuit(false);setTimerOn(false);setLandedSpade(false);setJustReachedFinish(false);setBattleTeams([]);setBattleWinners([]);}
function startGame(){const names=playerNames.filter(n=>n.trim());if(names.length<teamCount*2)return;const sh=shuffle(names);const cols=["#DC2626","#2563EB","#16A34A","#EAB308","#8B5CF6","#EC4899","#06B6D4","#F97316"];const ta=Array.from({length:teamCount},(_,i)=>({name:`Team ${i+1}`,players:[],color:cols[i%cols.length]}));sh.forEach((n,i)=>ta[i%teamCount].players.push(n));setTeams(ta);setPositions(Array(teamCount).fill(0));setCurTI(0);setRoundStart(0);setUsedWords(new Set());setTeamsAtFinish(new Set());setRoundFinishWinners([]);setLandedSpade(false);setJustReachedFinish(false);setBattleTeams([]);setBattleWinners([]);setScreen("BOARD");}
function startTurn(){const pos=positions[curTI];if(pos>=FINISH){doFinishSpade(curTI);return;}const cat=BOARD[pos];if(cat==="Spades"){setLandedSpade(false);doSpadeRound();return;}setCurCat(cat);initTurn();setScreen("TURN_PREP");}
function initTurn(){setTurnWords([]);setHasSkip(true);setSkipIdx(-1);setViewingSkip(false);setWordRevealed(false);}
function beginPlay(){drawWord();setTimer(TLEN);setTimerOn(true);setScreen("PLAYING");}
function drawWord(){const{word,cat}=rWord(curCat,usedWords);setCurWord(word);setCurWordCat(cat);setWordRevealed(false);}
function gotIt(){const nu=new Set(usedWords);nu.add(curWord);setUsedWords(nu);if(viewingSkip){const u=[...turnWords];u[skipIdx]={...u[skipIdx],status:"correct"};setTurnWords(u);setHasSkip(true);setSkipIdx(-1);setViewingSkip(false);const nc=u.filter(w=>w.status==="correct").length;if(positions[curTI]+nc>=FINISH){setTimerOn(false);setTurnWords(u);setTimeout(()=>endTurnWithWords(u),0);return;}drawWord();}else{const updated=[...turnWords,{word:curWord,category:curWordCat,status:"correct"}];setTurnWords(updated);const nc=updated.filter(w=>w.status==="correct").length;if(positions[curTI]+nc>=FINISH){setTimerOn(false);setTimeout(()=>endTurnWithWords(updated),0);return;}drawWord();}}
function endTurnWithWords(words){setTimerOn(false);setWordRevealed(false);const cc=words.filter(w=>w.status==="correct").length;const np=[...positions];const newPos=Math.min(np[curTI]+cc,FINISH);np[curTI]=newPos;setPositions(np);const rf=newPos>=FINISH&&!teamsAtFinish.has(curTI);if(newPos>=FINISH){const s=new Set(teamsAtFinish);s.add(curTI);setTeamsAtFinish(s);}if(newPos<FINISH&&BOARD[newPos]==="Spades"){setLandedSpade(true);setJustReachedFinish(false);setScreen("TURN_SUMMARY");return;}if(rf){setJustReachedFinish(true);setLandedSpade(false);setScreen("TURN_SUMMARY");return;}setLandedSpade(false);setJustReachedFinish(false);setScreen("TURN_SUMMARY");}
function skip(){if(!hasSkip)return;setHasSkip(false);const idx=turnWords.length;setTurnWords(p=>[...p,{word:curWord,category:curWordCat,status:"skipped"}]);setSkipIdx(idx);setViewingSkip(false);drawWord();}
function goBackSkip(){if(skipIdx<0)return;setViewingSkip(true);setCurWord(turnWords[skipIdx].word);setCurWordCat(turnWords[skipIdx].category);setWordRevealed(false);}
function endEarly(){setTimerOn(false);endTurn();}
function endTurn(){setTimerOn(false);setWordRevealed(false);const cc=turnWords.filter(w=>w.status==="correct").length;const np=[...positions];const newPos=Math.min(np[curTI]+cc,FINISH);np[curTI]=newPos;setPositions(np);const rf=newPos>=FINISH&&!teamsAtFinish.has(curTI);if(newPos>=FINISH){const s=new Set(teamsAtFinish);s.add(curTI);setTeamsAtFinish(s);}if(newPos<FINISH&&BOARD[newPos]==="Spades"){setLandedSpade(true);setJustReachedFinish(false);setScreen("TURN_SUMMARY");return;}if(rf){setJustReachedFinish(true);setLandedSpade(false);setScreen("TURN_SUMMARY");return;}setLandedSpade(false);setJustReachedFinish(false);setScreen("TURN_SUMMARY");}
function afterSummary(){if(landedSpade){setLandedSpade(false);doSpadeRound();return;}if(justReachedFinish){setJustReachedFinish(false);doFinishSpade(curTI);return;}advanceNext();}
function advanceNext(extraWinner){let winners=[...roundFinishWinners];if(extraWinner!==undefined&&!winners.includes(extraWinner)){winners.push(extraWinner);setRoundFinishWinners(winners);}const next=(curTI+1)%teams.length;if(next===roundStart){if(winners.length===1){setCurTI(winners[0]);setScreen("WINNER");return;}if(winners.length>1){setBattleTeams([...winners]);setBattleWinners([]);setBattleRound(0);setRoundFinishWinners([]);doBattleSpade(winners,0);return;}setRoundFinishWinners([]);}setCurTI(next);setScreen("BOARD");}
function doSpadeRound(){const c1=rCat(),c2=rCat();const w1=rWord(c1,usedWords);const tu=new Set(usedWords);tu.add(w1.word);const w2=rWord(c2,tu);setSpWords([{word:w1.word,category:w1.cat},{word:w2.word,category:w2.cat}]);setSpChosen(null);setScreen("SPADE_ROUND");}
function spadeChoice(i){setSpChosen(i);}
function spadeResult(winner){const nu=new Set(usedWords);nu.add(spWords[spChosen].word);setUsedWords(nu);setCurTI(winner);setRoundStart((winner+1)%teams.length);if(positions[winner]>=FINISH){setScreen("BOARD");return;}const cat=catForPos(positions[winner]);setCurCat(cat);initTurn();setScreen("TURN_PREP");}
function spadeTie(){const c1=rCat(),c2=rCat();const w1=rWord(c1,usedWords);const tu=new Set(usedWords);tu.add(w1.word);const w2=rWord(c2,tu);setSpWords([{word:w1.word,category:w1.cat},{word:w2.word,category:w2.cat}]);setSpChosen(null);setScreen("SPADE_ROUND");}
function doFinishSpade(teamIdx){const c1=rCat(),c2=rCat();const w1=rWord(c1,usedWords);const tu=new Set(usedWords);tu.add(w1.word);const w2=rWord(c2,tu);setSpWords([{word:w1.word,category:w1.cat},{word:w2.word,category:w2.cat}]);setSpChosen(null);setFinishSpadeFor(teamIdx);setScreen("FINISH_SPADE");}
function finishSpadeResult(winner){const nu=new Set(usedWords);nu.add(spWords[spChosen].word);setUsedWords(nu);if(winner===finishSpadeFor){advanceNext(finishSpadeFor);}else{setCurTI(winner);setRoundStart((winner+1)%teams.length);if(positions[winner]>=FINISH){doFinishSpade(winner);return;}const cat=catForPos(positions[winner]);setCurCat(cat);initTurn();setScreen("TURN_PREP");}}
function finishSpadeTie(){const c1=rCat(),c2=rCat();const w1=rWord(c1,usedWords);const tu=new Set(usedWords);tu.add(w1.word);const w2=rWord(c2,tu);setSpWords([{word:w1.word,category:w1.cat},{word:w2.word,category:w2.cat}]);setSpChosen(null);}
function finishSpadeNobody(){advanceNext();}
function doBattleSpade(bTeams,idx){const teamIdx=bTeams[idx];const c1=rCat(),c2=rCat();const w1=rWord(c1,usedWords);const tu=new Set(usedWords);tu.add(w1.word);const w2=rWord(c2,tu);setSpWords([{word:w1.word,category:w1.cat},{word:w2.word,category:w2.cat}]);setSpChosen(null);setFinishSpadeFor(teamIdx);setBattleRound(idx);setScreen("BATTLE_SPADE");}
function battleSpadeResult(winner){const nu=new Set(usedWords);nu.add(spWords[spChosen].word);setUsedWords(nu);const newBW=winner===finishSpadeFor?[...battleWinners,finishSpadeFor]:[...battleWinners];const nextIdx=battleRound+1;if(nextIdx<battleTeams.length){setBattleWinners(newBW);doBattleSpade(battleTeams,nextIdx);}else{if(newBW.length===1){setCurTI(newBW[0]);setScreen("WINNER");}else if(newBW.length===0){setBattleWinners([]);doBattleSpade(battleTeams,0);}else{setBattleTeams(newBW);setBattleWinners([]);doBattleSpade(newBW,0);}}}
function battleSpadeTie(){const c1=rCat(),c2=rCat();const w1=rWord(c1,usedWords);const tu=new Set(usedWords);tu.add(w1.word);const w2=rWord(c2,tu);setSpWords([{word:w1.word,category:w1.cat},{word:w2.word,category:w2.cat}]);setSpChosen(null);}
function battleSpadeNobody(){const nextIdx=battleRound+1;if(nextIdx<battleTeams.length){doBattleSpade(battleTeams,nextIdx);}else{const newBW=[...battleWinners];if(newBW.length===1){setCurTI(newBW[0]);setScreen("WINNER");}else if(newBW.length===0){setBattleWinners([]);doBattleSpade(battleTeams,0);}else{setBattleTeams(newBW);setBattleWinners([]);doBattleSpade(newBW,0);}}}
function renderBoard(){const W=340,H=340,cx=W/2,cy=H/2,r=132;const spaces=[];for(let i=0;i<TOTAL;i++){const a=(i/TOTAL)*2*Math.PI-Math.PI/2;const x=cx+r*Math.cos(a),y=cy+r*Math.sin(a);const cat=BOARD[i],col=CC[cat];const iF=i===FINISH,iS=i===0,sz=iF||iS?10.5:7;spaces.push(<g key={i}><circle cx={x} cy={y} r={sz} fill={col.bg} stroke={col.ring} strokeWidth={iF||iS?2.5:1.5} filter={iF?"url(#glow)":undefined}/>{cat==="Spades"&&<text x={x} y={y+3} textAnchor="middle" fontSize="7.5" fill="#E2E8F0" fontWeight="900">♠</text>}{iS&&<text x={x} y={y-16} textAnchor="middle" fontSize="6" fill="#94a3b8" fontWeight="700" letterSpacing="1.5">START</text>}{iF&&<text x={x} y={y-16} textAnchor="middle" fontSize="6" fill="#22C55E" fontWeight="700" letterSpacing="1.5">FINISH</text>}</g>);}const markers=positions.map((pos,ti)=>{if(!teams[ti])return null;const cp=Math.min(pos,FINISH);const a=(cp/TOTAL)*2*Math.PI-Math.PI/2;const off=(ti-(teams.length-1)/2)*7;const x=cx+(r+20+off)*Math.cos(a),y=cy+(r+20+off)*Math.sin(a);return<g key={`m${ti}`}><circle cx={x} cy={y} r={9} fill={teams[ti].color} stroke="#0B0B1A" strokeWidth={2.5}/><text x={x} y={y+3.5} textAnchor="middle" fontSize="8.5" fill="#fff" fontWeight="800">{ti+1}</text></g>;});return<svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%",maxWidth:340,margin:"0 auto",display:"block"}}><defs><filter id="glow"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><text x={cx} y={cy-18} textAnchor="middle" fontSize="19" fontWeight="900" fill="#E2E8F0" style={{fontFamily:"'Libre Baskerville',serif"}}>ARTICULATE</text><text x={cx} y={cy-1} textAnchor="middle" fontSize="7" fill="#475569" letterSpacing="3.5" fontWeight="600">DIGITAL EDITION</text>{[...CATEGORIES,"Spades"].map((cat,i)=>{const c=Math.floor(i/4),ro=i%4,lx=cx-48+c*68,ly=cy+16+ro*13;return<g key={`l${cat}`}><circle cx={lx} cy={ly} r={3.5} fill={CC[cat].bg} stroke={CC[cat].ring} strokeWidth={1}/><text x={lx+7} y={ly+3} fontSize="6" fill="#94a3b8" fontWeight="500">{cat==="Spades"?"♠ Spades":cat}</text></g>;})}{spaces}{markers}</svg>;}
function projPos(){return Math.min(positions[curTI]+turnWords.filter(w=>w.status==="correct").length,FINISH);}
function projSq(){const p=projPos();return p>=FINISH?"FINISH 🏁":BOARD[p];}
const S={app:{fontFamily:"'DM Sans','Segoe UI',sans-serif",minHeight:"100vh",background:"linear-gradient(160deg,#0B0B1A 0%,#141432 40%,#0B0B1A 100%)",color:"#E2E8F0",padding:"12px",boxSizing:"border-box",maxWidth:440,margin:"0 auto"},card:{background:"rgba(255,255,255,0.04)",backdropFilter:"blur(16px)",borderRadius:20,padding:"20px",border:"1px solid rgba(255,255,255,0.06)",marginBottom:12},h1:{fontFamily:"'Libre Baskerville',Georgia,serif",fontSize:30,fontWeight:900,textAlign:"center",margin:"0 0 2px",color:"#F8FAFC"},sub:{textAlign:"center",fontSize:10,color:"#64748B",letterSpacing:4,marginBottom:20,textTransform:"uppercase",fontWeight:600},lbl:{fontSize:12,fontWeight:600,color:"#94A3B8",marginBottom:6,display:"block"},inp:{width:"100%",padding:"10px 14px",borderRadius:12,border:"1px solid rgba(255,255,255,0.1)",background:"rgba(255,255,255,0.04)",color:"#E2E8F0",fontSize:14,outline:"none",boxSizing:"border-box",marginBottom:8},bp:{width:"100%",padding:"14px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#6366F1,#8B5CF6)",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",letterSpacing:0.5},bs:a=>({padding:"8px 14px",borderRadius:10,border:"none",fontSize:13,fontWeight:600,cursor:"pointer",background:a?"linear-gradient(135deg,#6366F1,#8B5CF6)":"rgba(255,255,255,0.06)",color:a?"#fff":"#94A3B8"}),bg:{padding:"12px 16px",borderRadius:12,border:"1px solid rgba(255,255,255,0.1)",background:"transparent",color:"#CBD5E1",fontSize:14,fontWeight:600,cursor:"pointer",width:"100%",textAlign:"center"},bc:{flex:1,padding:"16px",borderRadius:14,border:"none",background:"linear-gradient(135deg,#059669,#10B981)",color:"#fff",fontSize:16,fontWeight:700,cursor:"pointer"},bsk:d=>({flex:1,padding:"16px",borderRadius:14,border:"none",background:d?"rgba(255,255,255,0.06)":"linear-gradient(135deg,#DC2626,#EF4444)",color:d?"#475569":"#fff",fontSize:16,fontWeight:700,cursor:d?"default":"pointer"}),badge:c=>({display:"inline-block",padding:"5px 16px",borderRadius:20,background:CC[c]?.bg||"#475569",color:CT[c]||"#fff",fontSize:11,fontWeight:700,letterSpacing:1.5,textTransform:"uppercase"}),sr:a=>({display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 12px",borderRadius:12,marginBottom:4,background:a?"rgba(255,255,255,0.06)":"transparent"})};
const tPct=timer/TLEN,tCol=tPct>0.35?"#6366F1":tPct>0.15?"#F59E0B":"#EF4444";
const Font=()=><link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=DM+Mono:wght@400&display=swap" rel="stylesheet"/>;
const QuitOverlay=()=>confirmQuit?<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",backdropFilter:"blur(6px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,padding:20}}><div style={{...S.card,maxWidth:320,marginBottom:0}}><div style={{textAlign:"center"}}><div style={{fontSize:14,fontWeight:700,marginBottom:8}}>End Game?</div><p style={{fontSize:13,color:"#94A3B8",marginBottom:16}}>All progress will be lost.</p><div style={{display:"flex",gap:8}}><button style={{...S.bg,flex:1}} onClick={()=>setConfirmQuit(false)}>Cancel</button><button style={{...S.bg,flex:1,color:"#EF4444",borderColor:"rgba(239,68,68,0.3)"}} onClick={resetGame}>End Game</button></div></div></div></div>:null;
const QuitBtn=()=><div style={{textAlign:"center",marginTop:4}}><button onClick={()=>setConfirmQuit(true)} style={{background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:10,color:"#64748B",fontSize:12,padding:"8px 20px",cursor:"pointer",fontWeight:600}}>✕ End Game</button></div>;
if(screen==="SETUP"){return<div style={S.app}><Font/><div style={S.card}><h1 style={S.h1}>Articulate!</h1><p style={S.sub}>Digital Edition</p><label style={S.lbl}>Teams</label><div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>{[2,3,4,5,6].map(n=><button key={n} style={S.bs(teamCount===n)} onClick={()=>{setTeamCount(n);setPlayerNames(p=>{const need=n*2;return p.length<need?[...p,...Array(need-p.length).fill("")]:p;});}}>{n}</button>)}</div><label style={S.lbl}>Players</label>{playerNames.map((name,i)=><input key={i} style={S.inp} placeholder={`Player ${i+1}`} value={name} onChange={e=>{const a=[...playerNames];a[i]=e.target.value;setPlayerNames(a);}}/>)}<div style={{display:"flex",gap:6,marginBottom:16}}><button style={S.bg} onClick={()=>setPlayerNames(p=>[...p,""])}>+ Add Player</button>{playerNames.length>teamCount*2&&<button style={{...S.bg,color:"#EF4444",borderColor:"rgba(239,68,68,0.3)"}} onClick={()=>setPlayerNames(p=>p.slice(0,-1))}>− Remove</button>}</div><button style={S.bp} onClick={startGame}>Start Game</button>{playerNames.filter(n=>n.trim()).length<teamCount*2&&<p style={{fontSize:11,color:"#EF4444",textAlign:"center",marginTop:8}}>Need at least {teamCount*2} players for {teamCount} teams</p>}</div></div>;}
if(screen==="BOARD"){const ct=teams[curTI],af=positions[curTI]>=FINISH,bc=af?"Spades":BOARD[positions[curTI]];return<div style={S.app}><Font/><QuitOverlay/><div style={S.card}>{renderBoard()}</div><div style={S.card}>{teams.map((t,i)=><div key={i} style={S.sr(i===curTI)}><div style={{display:"flex",alignItems:"center",gap:8}}><div style={{width:10,height:10,borderRadius:"50%",background:t.color,flexShrink:0}}/><span style={{fontWeight:700,fontSize:14}}>{t.name}</span><span style={{fontSize:11,color:"#64748B"}}>{t.players.join(", ")}</span></div><span style={{fontWeight:700,fontSize:13,color:"#94A3B8"}}>{positions[i]>=FINISH?"🏁":`${positions[i]}/${FINISH}`}</span></div>)}</div><div style={S.card}><div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#64748B",marginBottom:4,letterSpacing:2,textTransform:"uppercase"}}>Current Turn</div><div style={{fontSize:22,fontWeight:900,fontFamily:"'Libre Baskerville',serif",marginBottom:6}}>{ct.name}</div><div style={{fontSize:12,color:"#64748B",marginBottom:10}}>{ct.players.join(", ")}</div><div style={{marginBottom:16}}><span style={S.badge(bc)}>{af?"♠ FINISH SPADE":bc==="Spades"?"♠ SPADES":bc}</span></div><button style={S.bp} onClick={startTurn}>{af?"Attempt Finish Spade ♠":bc==="Spades"?"Start Spade Round ♠":"Start Turn"}</button></div></div><QuitBtn/></div>;}
if(screen==="TURN_PREP"){return<div style={S.app}><Font/><div style={S.card}><div style={{textAlign:"center"}}><div style={{fontSize:11,color:"#64748B",marginBottom:8,letterSpacing:2,textTransform:"uppercase"}}>{teams[curTI].name}'s Turn</div><div style={{marginBottom:12}}><span style={S.badge(curCat)}>{curCat}</span></div><p style={{fontSize:13,color:"#64748B",marginBottom:20,lineHeight:1.7}}>Pass the device to the describer.<br/>Only they should see the words.</p><button style={S.bp} onClick={beginPlay}>Ready — Start Timer</button></div></div></div>;}
if(screen==="PLAYING"){const cc=turnWords.filter(w=>w.status==="correct").length;const pp=projPos(),ps=projSq();const canBack=skipIdx>=0&&!viewingSkip&&turnWords[skipIdx]?.status==="skipped";return<div style={S.app}><Font/><div style={S.card}><div style={{width:76,height:76,borderRadius:"50%",margin:"0 auto 12px",background:`conic-gradient(${tCol} ${tPct*360}deg,rgba(255,255,255,0.06) 0deg)`,display:"flex",alignItems:"center",justifyContent:"center"}}><div style={{width:60,height:60,borderRadius:"50%",background:"#141432",display:"flex",alignItems:"center",justifyContent:"center",fontSize:22,fontWeight:800,fontFamily:"'DM Mono',monospace",color:tPct<=0.15?"#EF4444":"#E2E8F0"}}>{timer}</div></div><div style={{textAlign:"center",marginBottom:4}}><span style={S.badge(curCat)}>{curCat}</span></div>{viewingSkip&&<div style={{textAlign:"center",fontSize:10,color:"#F59E0B",fontWeight:600,marginTop:6}}>SKIPPED WORD — get it right to reclaim your skip</div>}<div onClick={()=>setWordRevealed(true)} style={{fontSize:26,fontWeight:900,textAlign:"center",padding:"28px 16px",fontFamily:"'Libre Baskerville',serif",lineHeight:1.25,cursor:wordRevealed?"default":"pointer",color:wordRevealed?"#F8FAFC":"transparent",textShadow:wordRevealed?"none":"0 0 28px rgba(255,255,255,0.4)",userSelect:wordRevealed?"auto":"none",transition:"all 0.2s",minHeight:80,display:"flex",alignItems:"center",justifyContent:"center"}}>{wordRevealed?curWord:"Tap to Reveal"}</div><div style={{background:"rgba(255,255,255,0.04)",borderRadius:14,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",justifyContent:"space-between"}}><div><div style={{fontSize:10,color:"#64748B",letterSpacing:1,textTransform:"uppercase",marginBottom:2}}>If you stop now</div><div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:18,fontWeight:800,color:"#E2E8F0",fontFamily:"'DM Mono',monospace"}}>sq {pp}</span>{pp>=FINISH?<span style={{fontSize:12,fontWeight:700,color:"#22C55E"}}>🏁 FINISH</span>:<span style={{fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:6,background:CC[ps]?.bg||"#475569",color:CT[ps]||"#fff"}}>{ps==="Spades"?"♠ Spades":ps}</span>}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:24,fontWeight:900,color:"#E2E8F0",fontFamily:"'DM Mono',monospace"}}>{cc}</div><div style={{fontSize:10,color:"#64748B"}}>correct</div></div></div><div style={{display:"flex",gap:8,marginBottom:8}}><button style={S.bc} onClick={gotIt}>✓ Got it</button>{viewingSkip?<button style={S.bsk(false)} onClick={()=>{setViewingSkip(false);drawWord();}}>✗ Nope</button>:<button style={S.bsk(!hasSkip)} onClick={skip} disabled={!hasSkip}>↷ Skip</button>}</div>{canBack&&<button style={{...S.bg,marginBottom:8}} onClick={goBackSkip}>↩ Go back to skipped word</button>}<button style={{...S.bg,color:"#F59E0B",borderColor:"rgba(245,158,11,0.2)"}} onClick={endEarly}>■ End Turn Early → land on sq {pp} {pp>=FINISH?"🏁":`(${ps==="Spades"?"♠":ps})`}</button></div></div>;}
if(screen==="TURN_SUMMARY"){const cor=turnWords.filter(w=>w.status==="correct");return<div style={S.app}><Font/><div style={S.card}><div style={{textAlign:"center",marginBottom:16}}><div style={{fontSize:11,color:"#64748B",letterSpacing:2,textTransform:"uppercase",marginBottom:8}}>{timer<=0?"Time's Up!":"Turn Ended"}</div><div style={{fontSize:52,fontWeight:900,fontFamily:"'Libre Baskerville',serif",lineHeight:1}}>{cor.length}</div><div style={{fontSize:13,color:"#64748B",marginTop:4}}>word{cor.length!==1?"s":""} by {teams[curTI].name}</div><div style={{fontSize:11,color:"#8B5CF6",marginTop:2}}>Now on square {positions[curTI]}{positions[curTI]>=FINISH?" 🏁":""}</div>{landedSpade&&<div style={{fontSize:12,color:"#F59E0B",marginTop:8,fontWeight:700}}>♠ Landed on Spades! Spade round coming up...</div>}{justReachedFinish&&<div style={{fontSize:12,color:"#22C55E",marginTop:8,fontWeight:700}}>🏁 Reached the finish! Finish Spade coming up...</div>}</div>{turnWords.map((tw,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}><div><span style={{fontSize:14,fontWeight:600}}>{tw.word}</span><span style={{fontSize:10,color:"#64748B",marginLeft:8}}>{tw.category}</span></div><span style={{fontSize:13,fontWeight:700,color:tw.status==="correct"?"#10B981":"#EF4444"}}>{tw.status==="correct"?"✓":"✗"}</span></div>)}<button style={{...S.bp,marginTop:20}} onClick={afterSummary}>{landedSpade?"Start Spade Round ♠":justReachedFinish?"Start Finish Spade ♠":"Next Team →"}</button></div></div>;}
if(screen==="SPADE_ROUND"){return<div style={S.app}><Font/><div style={S.card}><div style={{textAlign:"center",marginBottom:16}}><span style={S.badge("Spades")}>♠ SPADE ROUND</span><p style={{fontSize:12,color:"#64748B",marginTop:10,lineHeight:1.7}}>Free-for-all! All teams can guess.<br/><strong style={{color:"#E2E8F0"}}>{teams[curTI].name}</strong>'s describer — pick one word:</p></div>{spChosen===null?<div style={{display:"flex",gap:8}}>{spWords.map((sw,i)=><button key={i} onClick={()=>spadeChoice(i)} style={{...S.bg,flex:1,padding:"20px 8px"}}><div style={{fontSize:9,color:"#64748B",marginBottom:4}}>{sw.category}</div><div style={{fontSize:17,fontWeight:700,fontFamily:"'Libre Baskerville',serif"}}>{sw.word}</div></button>)}</div>:<div><div style={{fontSize:24,fontWeight:900,textAlign:"center",padding:"24px 16px",fontFamily:"'Libre Baskerville',serif",background:"rgba(255,255,255,0.03)",borderRadius:16,marginBottom:16}}>{spWords[spChosen].word}</div><div style={{fontSize:11,color:"#64748B",textAlign:"center",marginBottom:12,letterSpacing:1}}>WHO GUESSED IT?</div><div style={{display:"flex",flexDirection:"column",gap:6}}>{teams.map((t,i)=><button key={i} style={S.bg} onClick={()=>spadeResult(i)}><span style={{color:t.color,fontWeight:700}}>{t.name}</span><span style={{color:"#64748B",fontSize:11}}> — {t.players.join(", ")}</span></button>)}<button style={{...S.bg,color:"#F59E0B",borderColor:"rgba(245,158,11,0.2)"}} onClick={spadeTie}>It's a tie — new words!</button></div></div>}</div></div>;}
if(screen==="FINISH_SPADE"){const ft=teams[finishSpadeFor];return<div style={S.app}><Font/><div style={S.card}><div style={{textAlign:"center",marginBottom:16}}><div style={{fontSize:36,marginBottom:8}}>🏁</div><span style={S.badge("Spades")}>♠ FINISH LINE SPADE</span><p style={{fontSize:12,color:"#64748B",marginTop:10,lineHeight:1.7}}><strong style={{color:"#E2E8F0"}}>{ft.name}</strong> has reached the finish!<br/>Free-for-all — but they must win it themselves to claim victory.</p></div>{spChosen===null?<div style={{display:"flex",gap:8}}>{spWords.map((sw,i)=><button key={i} onClick={()=>setSpChosen(i)} style={{...S.bg,flex:1,padding:"20px 8px"}}><div style={{fontSize:9,color:"#64748B",marginBottom:4}}>{sw.category}</div><div style={{fontSize:17,fontWeight:700,fontFamily:"'Libre Baskerville',serif"}}>{sw.word}</div></button>)}</div>:<div><div style={{fontSize:24,fontWeight:900,textAlign:"center",padding:"24px 16px",fontFamily:"'Libre Baskerville',serif",background:"rgba(255,255,255,0.03)",borderRadius:16,marginBottom:16}}>{spWords[spChosen].word}</div><div style={{fontSize:11,color:"#64748B",textAlign:"center",marginBottom:12,letterSpacing:1}}>WHO GUESSED IT?</div><div style={{display:"flex",flexDirection:"column",gap:6}}>{teams.map((t,i)=><button key={i} style={S.bg} onClick={()=>finishSpadeResult(i)}><span style={{color:t.color,fontWeight:700}}>{t.name}</span>{i===finishSpadeFor&&<span style={{fontSize:10,color:"#F59E0B"}}> (needs this!)</span>}</button>)}<button style={{...S.bg,color:"#F59E0B",borderColor:"rgba(245,158,11,0.2)"}} onClick={finishSpadeTie}>It's a tie — new words!</button><button style={{...S.bg,color:"#EF4444",borderColor:"rgba(239,68,68,0.2)"}} onClick={finishSpadeNobody}>Nobody got it</button></div></div>}</div></div>;}
if(screen==="BATTLE_SPADE"){const ft=teams[finishSpadeFor];return<div style={S.app}><Font/><div style={S.card}><div style={{textAlign:"center",marginBottom:16}}><div style={{fontSize:28,marginBottom:8}}>⚔️</div><span style={S.badge("Spades")}>♠ BATTLE OFF</span><p style={{fontSize:12,color:"#64748B",marginTop:10,lineHeight:1.7}}>Multiple teams reached finish! <strong style={{color:"#E2E8F0"}}>{ft.name}</strong>'s turn to attempt their Spade.</p><div style={{fontSize:11,color:"#94A3B8",marginTop:4}}>Teams in battle: {battleTeams.map(ti=>teams[ti].name).join(" vs ")}</div></div>{spChosen===null?<div style={{display:"flex",gap:8}}>{spWords.map((sw,i)=><button key={i} onClick={()=>setSpChosen(i)} style={{...S.bg,flex:1,padding:"20px 8px"}}><div style={{fontSize:9,color:"#64748B",marginBottom:4}}>{sw.category}</div><div style={{fontSize:17,fontWeight:700,fontFamily:"'Libre Baskerville',serif"}}>{sw.word}</div></button>)}</div>:<div><div style={{fontSize:24,fontWeight:900,textAlign:"center",padding:"24px 16px",fontFamily:"'Libre Baskerville',serif",background:"rgba(255,255,255,0.03)",borderRadius:16,marginBottom:16}}>{spWords[spChosen].word}</div><div style={{fontSize:11,color:"#64748B",textAlign:"center",marginBottom:12,letterSpacing:1}}>WHO GUESSED IT?</div><div style={{display:"flex",flexDirection:"column",gap:6}}>{teams.map((t,i)=><button key={i} style={S.bg} onClick={()=>battleSpadeResult(i)}><span style={{color:t.color,fontWeight:700}}>{t.name}</span>{i===finishSpadeFor&&<span style={{fontSize:10,color:"#F59E0B"}}> (needs this!)</span>}</button>)}<button style={{...S.bg,color:"#F59E0B",borderColor:"rgba(245,158,11,0.2)"}} onClick={battleSpadeTie}>It's a tie — new words!</button><button style={{...S.bg,color:"#EF4444",borderColor:"rgba(239,68,68,0.2)"}} onClick={battleSpadeNobody}>Nobody got it</button></div></div>}</div></div>;}
if(screen==="WINNER"){const w=teams[curTI];return<div style={S.app}><Font/><div style={{...S.card,textAlign:"center",padding:"48px 20px"}}><div style={{fontSize:72,marginBottom:12}}>🏆</div><h1 style={{...S.h1,fontSize:34,marginBottom:6,color:w.color}}>{w.name} Wins!</h1><p style={{fontSize:15,color:"#94A3B8",marginBottom:4}}>{w.players.join(" & ")}</p><p style={{fontSize:13,color:"#475569",marginBottom:32}}>Champions! 🎉</p><button style={S.bp} onClick={resetGame}>Play Again</button></div></div>;}
return null;}
ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
